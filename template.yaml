AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Contractor Trial — Campfire Invoice Query

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    MemorySize: 256
    Tracing: Active
    DeadLetterConfig:
      TargetArn: !GetAtt InvoiceDLQ.Arn

Resources:
  # ─── DynamoDB Table ──────────────────────────────────────────────────
  InvoiceTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CampfireInvoices
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: InvoiceByIdGSI
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
          Tags:
            - Key: Purpose
              Value: future-invoice-id-lookup
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: prod
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  # ─── DLQ Queue ───────────────────────────────────────────────────────
  # 注意：DeadLetterConfig 仅对异步调用（SNS、EventBridge、S3 事件等）生效。
  # 当前 Lambda 由 API Gateway HTTP API 同步调用，失败时 API Gateway 直接返回 5xx，
  # 不会投递到 DLQ。保留 DLQ 以备未来添加异步事件源。
  InvoiceDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  # ─── API Access Logs ─────────────────────────────────────────────────
  # HTTP API logs are auto-created under /aws/apigateway/<stage>.
  # We create a retention policy log group so logs aren't lost.
  InvoiceApiLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/apigateway/prod
      RetentionInDays: 30

  # ─── HttpApi with CORS + Throttling ──────────────────────────────────
  InvoiceHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      AccessLogSetting:
        DestinationArn: !GetAtt InvoiceApiLogs.Arn
        Format: '{"requestId":"$request_id","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","resourcePath":"$context.resourcePath","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength"}'
      StageName: prod
      Description: Campfire Invoice Query API
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        MaxAge: 86400
      RouteSettings:
        - HttpMethod: '*'
          StageVariables: {}
          Throttling:
            BurstLimit: 1000
            RateLimit: 5000

  # ─── Lambda Function ─────────────────────────────────────────────────
  InvoiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: CampfireInvoiceQuery
      Handler: handler.handler
      CodeUri: ./
      ReservedConcurrentExecutions: 500
      Environment:
        Variables:
          TABLE_NAME: !Ref InvoiceTable
          SUPPLIER_TABLE_NAME: !Ref InvoiceTable
      Events:
        InvoiceApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref InvoiceHttpApi
            Path: /invoices
            Method: GET
        CreateInvoice:
          Type: HttpApi
          Properties:
            ApiId: !Ref InvoiceHttpApi
            Path: /invoices
            Method: POST
        UpdateInvoice:
          Type: HttpApi
          Properties:
            ApiId: !Ref InvoiceHttpApi
            Path: /invoices
            Method: PUT
        DeleteInvoice:
          Type: HttpApi
          Properties:
            ApiId: !Ref InvoiceHttpApi
            Path: /invoices
            Method: DELETE
        HealthCheck:
          Type: HttpApi
          Properties:
            ApiId: !Ref InvoiceHttpApi
            Path: /health
            Method: GET
        SupplierCreate:
          Type: HttpApi
          Properties:
            ApiId: !Ref InvoiceHttpApi
            Path: /suppliers
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref InvoiceTable

  # ─── Supplier Detail Route (GET /suppliers/{supplier_id}) ──────────────
  SupplierDetailRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref InvoiceHttpApi
      RouteKey: GET /suppliers/{supplier_id}
      Target: !Join
        - ""
        - - "integrations/"
          - !Ref SupplierDetailIntegration

  # ─── Supplier Detail Integration ───────────────────────────────────────
  SupplierDetailIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref InvoiceHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${InvoiceFunction.Arn}/invocations"
      PayloadFormatVersion: "2.0"

  # ─── Supplier Detail Route Response ────────────────────────────────────
  SupplierDetailRouteResponse:
    Type: AWS::ApiGatewayV2::RouteResponse
    Properties:
      ApiId: !Ref InvoiceHttpApi
      RouteId: !Ref SupplierDetailRoute
      RouteResponseKey: "$default"

  # ─── SNS Topic for Alerts ────────────────────────────────────────────
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: CampfireInvoiceAlerts

  # ─── CloudWatch Alarms ─────────────────────────────────────────────

  # Lambda errors — alert on any error
  ALM_InvoiceFunctionErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alert on any Lambda error"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref InvoiceFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  # Lambda throttling
  ALM_InvoiceFunctionThrottles:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alert on Lambda throttling"
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref InvoiceFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  # Lambda P99 latency
  ALM_InvoiceFunctionLatency:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alert on high Lambda latency (P99 > 5s)"
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref InvoiceFunction
      Statistic: p99
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  # API Gateway 5xx errors (HTTP API V2 uses ApiId + lowercase metric names)
  ALM_InvoiceApi5xx:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alert on API 5xx errors"
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref InvoiceHttpApi
        - Name: Stage
          Value: prod
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  # DynamoDB throttling (PAY_PER_REQUEST)
  ALM_InvoiceDynamoDBThrottles:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alert on DynamoDB throttling events"
      Namespace: AWS/DynamoDB
      MetricName: ThrottledRequests
      Dimensions:
        - Name: TableName
          Value: !Ref InvoiceTable
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

  # DLQ message count
  ALM_InvoiceDLQDepth:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Alert when Lambda failures accumulate in DLQ"
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt InvoiceDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${InvoiceHttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod/invoices"
  FunctionArn:
    Description: "Lambda function ARN"
    Value: !GetAtt InvoiceFunction.Arn
