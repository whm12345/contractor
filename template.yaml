AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Contractor Trial — Campfire Invoice Query

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    MemorySize: 128

Resources:
  # ─── DynamoDB Table ──────────────────────────────────────────────────
  InvoiceTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CampfireInvoices
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: InvoiceByIdGSI
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true

  # ─── Lambda Function ─────────────────────────────────────────────────
  InvoiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: CampfireInvoiceQuery
      Handler: handler.query
      CodeUri: ./
      Environment:
        Variables:
          TABLE_NAME: !Ref InvoiceTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref InvoiceTable

  # ─── HTTP API (v2) ──────────────────────────────────────────────────
  InvoiceHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      Description: Campfire Invoice Query API

  # ─── Route + Integration ────────────────────────────────────────────
  InvoiceApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref InvoiceHttpApi
      RouteKey: GET /invoices
      Target: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/
        !GetAtt InvoiceFunction.Arn/invocations
      AuthorizationType: NONE

  # ─── Lambda Permission ──────────────────────────────────────────────
  InvoiceApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref InvoiceFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${InvoiceHttpApi}/*/GET/invoices

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${InvoiceHttpApi}.execute-api.${AWS::Region}.amazonaws.com/prod/invoices"
  FunctionArn:
    Description: "Lambda function ARN"
    Value: !GetAtt InvoiceFunction.Arn
